name: Go

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.26.2"

    # -----------------------------
    # Ensure module consistency
    # -----------------------------
    - name: Tidy modules
      working-directory: backend
      run: |
        go mod tidy
        git diff --exit-code

    - name: Download dependencies
      working-directory: backend
      run: go mod download

    # -----------------------------
    # IMPORTANT: build first
    # fixes all "undefined: X"
    # -----------------------------
    - name: Build (type check gate)
      working-directory: backend
      run: go build ./...

    # -----------------------------
    # Lint (now safe)
    # -----------------------------
    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        working-directory: backend

    - name: Test
      working-directory: backend
      run: go test ./...

    - name: Run govulncheck
      working-directory: backend
      run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
