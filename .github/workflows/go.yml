name: Go
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.26"
    # -----------------------------
    # Ensure module consistency
    # -----------------------------
    - name: Print Go version
      run: |
        go version
    
    - name: Tidy modules
      working-directory: backend
      run: |
        go mod tidy
        git diff --exit-code go.mod go.sum
        
    - name: Download dependencies
      working-directory: backend
      env:
        GOPROXY: "https://proxy.golang.org,https://goproxy.io,direct"
        GONOSUMCHECK: "*"
      run: go mod download
    # -----------------------------
    # IMPORTANT: build first
    # fixes all "undefined: X"
    # -----------------------------
    - name: Build (type check gate)
      working-directory: backend
      run: go build ./...
      
    - name: Test
      working-directory: backend
      run: go test ./...
