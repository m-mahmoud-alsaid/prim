basePath: /api/v1
definitions:
  api.BadReqResponse:
    properties:
      code:
        example: BAD_REQUEST
        type: string
      details:
        items:
          $ref: '#/definitions/api.FieldError'
        type: array
      message:
        example: field name should be string
        type: string
    type: object
  api.DataResponse:
    properties:
      data: {}
    type: object
  api.ErrorResponse:
    properties:
      code:
        example: CODE_ERROR
        type: string
      message:
        example: an error occured
        type: string
    type: object
  api.FieldError:
    properties:
      field:
        example: name
        type: string
      tags:
        example: string
        type: string
    type: object
  api.MessageResponse:
    properties:
      message:
        example: the request sent successfully
        type: string
    type: object
  api.Page:
    properties:
      has_next:
        example: true
        type: boolean
      has_previous:
        example: false
        type: boolean
      page:
        example: 1
        type: integer
      page_size:
        example: 10
        type: integer
      total_items:
        example: 20
        type: integer
      total_pages:
        example: 2
        type: integer
    type: object
  api.PaginatedResponse:
    properties:
      data: {}
      meta: {}
    type: object
  api.SuccessResponse:
    properties:
      data: {}
      message:
        type: string
      meta: {}
    type: object
  api.UnauthorizedResponse:
    properties:
      message:
        type: string
    type: object
  auth.MeResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      role:
        items:
          type: string
        type: array
      status:
        type: string
    type: object
  auth.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  auth.ResendChallengeRequest:
    properties:
      identifier:
        type: string
    required:
    - identifier
    type: object
  auth.StartChallengeRequest:
    properties:
      identifier:
        type: string
    required:
    - identifier
    type: object
  auth.StartChallengeResponse:
    properties:
      duration:
        type: integer
      expires_at:
        type: string
      identifier:
        type: string
    type: object
  auth.TokensResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  auth.VerifyChallengeRequest:
    properties:
      code:
        type: string
      identifier:
        type: string
    required:
    - code
    - identifier
    type: object
  brand.BrandResponse:
    properties:
      created_at:
        example: "2026-07-01T05:04:38Z"
        type: string
      id:
        example: 358b2e03-0b3f-40a4-8163-ebed0cb252ee
        type: string
      logo_label:
        example: nvidia logo
        type: string
      logo_url:
        example: https://pictures.com/nvidia.png
        type: string
      name:
        example: nvidia
        type: string
      udpated_at:
        example: "2026-07-01T05:04:38Z"
        type: string
    type: object
  brand.CreateBrandRequest:
    properties:
      logo_label:
        example: apple logo
        type: string
      logo_url:
        example: https://pictures.com/apple.png
        type: string
      name:
        example: apple
        type: string
    required:
    - logo_label
    - logo_url
    - name
    type: object
  category.CategoryResponse:
    properties:
      created_at:
        example: "2026-06-30T15:47:19Z"
        type: string
      id:
        example: c8ccec1c-ded5-4380-9f78-a1d4eb3d4f28
        type: string
      name:
        example: Electronic
        type: string
      parent_id:
        example: c8ccec1c-ded5-4380-9f78-a1d4eb3d4f28
        type: string
      slug:
        example: electronic
        type: string
      updated_at:
        example: "2026-06-30T15:47:19Z"
        type: string
    type: object
  category.CreateCategoryRequest:
    properties:
      name:
        example: electronic
        type: string
      parent_id:
        example: c8ccec1c-ded5-4380-9f78-a1d4eb3d4f28
        type: string
    required:
    - name
    type: object
  product.CreateProductRequest:
    properties:
      currency:
        type: string
      description:
        type: string
      price:
        type: integer
      short_description:
        type: string
      sku:
        type: string
      slug:
        type: string
      status:
        type: string
      title:
        type: string
    required:
    - price
    - slug
    - status
    - title
    type: object
  product.ProductResponse:
    properties:
      created_at:
        type: string
      currency:
        type: string
      description:
        type: string
      id:
        type: string
      price:
        type: integer
      short_description:
        type: string
      sku:
        type: string
      slug:
        type: string
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
  description: This is the Prim API
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Prim API
  version: "1.0"
paths:
  /auth/challenge/resend:
    post:
      consumes:
      - application/json
      description: Resends a new verification code to the provided email or phone
        number if allowed by the challenge policy.
      parameters:
      - description: Resend Challenge Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.ResendChallengeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.BadReqResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Resend an authentication challenge
      tags:
      - Auth
  /auth/challenge/start:
    post:
      consumes:
      - application/json
      description: Starts an authentication challenge by sending a verification code
        to the provided email or phone number.
      parameters:
      - description: Challenge Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.StartChallengeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.DataResponse'
            - properties:
                data:
                  $ref: '#/definitions/auth.StartChallengeResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.BadReqResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Start an authentication challenge
      tags:
      - Auth
  /auth/challenge/verify:
    post:
      consumes:
      - application/json
      description: Verifies the one-time code sent to the user's email or phone and
        returns an access token and refresh token.
      parameters:
      - description: Challenge Verification Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.VerifyChallengeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.DataResponse'
            - properties:
                data:
                  $ref: '#/definitions/auth.TokensResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.BadReqResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.UnauthorizedResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Verify an authentication challenge
      tags:
      - Auth
  /auth/me:
    get:
      consumes:
      - application/json
      description: fetch session user data
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.DataResponse'
            - properties:
                data:
                  $ref: '#/definitions/auth.MeResponse'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: fetch session user data
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Rotate refresh token and issue new access and refresh tokens.
      parameters:
      - description: Refresh Token
        in: body
        name: refresh_token
        required: true
        schema:
          $ref: '#/definitions/auth.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.DataResponse'
            - properties:
                data:
                  $ref: '#/definitions/auth.TokensResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.BadReqResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.UnauthorizedResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Rotate refresh token and issue new access and refresh tokens.
      tags:
      - Auth
  /brands:
    post:
      consumes:
      - application/json
      description: create a new products brand
      parameters:
      - description: brand data
        in: body
        name: brand
        required: true
        schema:
          $ref: '#/definitions/brand.CreateBrandRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/api.DataResponse'
            - properties:
                data:
                  $ref: '#/definitions/brand.BrandResponse'
              type: object
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: create a new products brand
      tags:
      - Brand
  /categories:
    get:
      consumes:
      - application/json
      description: list all categories
      parameters:
      - example: 1
        in: query
        name: page
        type: integer
      - example: 10
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.PaginatedResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/category.CategoryResponse'
                  type: array
                meta:
                  $ref: '#/definitions/api.Page'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: list all categories
      tags:
      - Category
    post:
      consumes:
      - application/json
      description: create a new category
      parameters:
      - description: 'Category Data '
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/category.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/api.DataResponse'
            - properties:
                data:
                  $ref: '#/definitions/category.CategoryResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: create a new category
      tags:
      - Category
  /categories/{id}:
    get:
      consumes:
      - application/json
      description: fetch a category by id
      parameters:
      - description: Category ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.DataResponse'
            - properties:
                data:
                  $ref: '#/definitions/category.CategoryResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: get a category by id
      tags:
      - Category
  /categories/{slug}:
    get:
      consumes:
      - application/json
      description: fetch a category by slug
      parameters:
      - description: Category slug(string)
        format: string
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.DataResponse'
            - properties:
                data:
                  $ref: '#/definitions/category.CategoryResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: get a category by slug
      tags:
      - Category
  /products:
    get:
      consumes:
      - application/json
      description: Get all products
      parameters:
      - example: 1
        in: query
        name: page
        type: integer
      - example: 10
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.BadReqResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get all products
      tags:
      - Products
    post:
      consumes:
      - application/json
      description: Create a new product
      parameters:
      - description: Product Data
        in: body
        name: product
        required: true
        schema:
          $ref: '#/definitions/product.CreateProductRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/api.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/product.ProductResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.BadReqResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Create a new product
      tags:
      - Products
  /products/{id}:
    get:
      consumes:
      - application/json
      description: Get a product by passing it's id
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/product.ProductResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.BadReqResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Get a product by id
      tags:
      - Products
  /roles:
    get:
      consumes:
      - application/json
      description: fetch all the roles using pagination
      parameters:
      - example: 1
        in: query
        name: page
        type: integer
      - example: 10
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.PaginatedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.BadReqResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.UnauthorizedResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: fetch all the roles using pagination
      tags:
      - Roles
security:
- BearerAuth: []
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
